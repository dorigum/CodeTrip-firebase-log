name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      # TODO(260524): This workflow is still the old EC2/AWS SSH deploy flow.
      # The Firebase repository should either disable this file or replace this
      # step with a Firebase Hosting deploy workflow. The current failure
      # "missing server host" happens when secrets.EC2_HOST is not configured.
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # port: ${{ secrets.EC2_PORT }}
          script: |
            cd ${{ secrets.EC2_PROJECT_PATH }}
            git pull origin main
            docker compose up -d --build
            docker image prune -f
